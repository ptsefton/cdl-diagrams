<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="943px" preserveAspectRatio="none" style="width:1303px;height:943px;background:#FFFFFF;" version="1.1" viewBox="0 0 1303 943" width="1303px" zoomAndPan="magnify"><title>Annotated Guide to Choosing a Data Repository</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="42" font-weight="bold" lengthAdjust="spacing" textLength="1037.3057" x="131.3911" y="60.6055">Annotated Guide to Choosing a Data Repository</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="834.6992" x="152.584" y="81.4648"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="814.6992" x="162.584" y="114.668">https://ardc.edu.au/resource/guide-to-choosing-a-data-repository/</text><path d="M20,220.3945 L20,399.9883 L498.0781,399.9883 L498.0781,230.3945 L488.0781,220.3945 L20,220.3945" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><path d="M488.0781,220.3945 L488.0781,230.3945 L498.0781,230.3945 L488.0781,220.3945" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="449.4844" x="26" y="248.5977">When deciding what data repository to</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="440.7188" x="26" y="276.8633">publish in key considerations include:</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="249.8672" x="26" y="305.1289">- security obligations</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="293.5781" x="26" y="333.3945">- publisher requirements</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="299.5664" x="26" y="361.6602">- community conventions</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="244.8164" x="26" y="389.9258">- institutional policy.</text><path d="M641.7891,149.7305 L641.7891,470.6523 L1153.5703,470.6523 L1153.5703,159.7305 L1143.5703,149.7305 L641.7891,149.7305" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><path d="M1143.5703,149.7305 L1143.5703,159.7305 L1153.5703,159.7305 L1143.5703,149.7305" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="165.0586" x="647.7891" y="177.9336">Also consider:</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="429.9609" x="647.7891" y="206.1992">- the type of data you are publishing</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="283.6523" x="647.7891" y="234.4648">- its format and file size</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="483.1875" x="647.7891" y="262.7305">- its potential reuse and reuse conditions</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="338.1563" x="670.5703" y="290.9961">in the form of, say, a licence.</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="7.5938" x="647.7891" y="319.2617">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="391.3945" x="647.7891" y="347.5273">Other considerations can include:</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="276.8789" x="647.7891" y="375.793">- versioning of the data</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="343.3945" x="647.7891" y="404.0586">- storage location of the data</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="272.1211" x="647.7891" y="432.3242">- sensitivity of the data</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="234.1055" x="647.7891" y="460.5898">- access conditions.</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="123.7109" x="508.0781" y="286.0586"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="103.7109" x="518.0781" y="319.2617">Consider</text><polygon fill="#F1F1F1" points="394.9902,500.6523,744.877,500.6523,756.877,528.918,744.877,557.1836,394.9902,557.1836,382.9902,528.918,394.9902,500.6523" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="281.332" x="394.9902" y="523.8555">Select/Identify a Subject</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="349.8867" x="394.9902" y="552.1211">or Domain Specific Repository</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="30.4189" x="352.5713" y="525.1211">Yes</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="22.2275" x="756.877" y="525.1211">no</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="85.7422" x="236.7783" y="567.1836"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="65.7422" x="246.7783" y="600.3867">Use it</text><polygon fill="#F1F1F1" points="747.6357,567.1836,972.7998,567.1836,984.7998,595.4492,972.7998,623.7148,747.6357,623.7148,735.6357,595.4492,747.6357,567.1836" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="225.1641" x="747.6357" y="590.3867">Use an institutional</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="176.4727" x="747.6357" y="618.6523">data repository</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="22.2275" x="713.4082" y="591.6523">no</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="28.6084" x="984.7998" y="591.6523">yes</text><polygon fill="#F1F1F1" points="427.3916,633.7148,851.8564,633.7148,863.8564,647.8477,851.8564,661.9805,427.3916,661.9805,415.3916,647.8477,427.3916,633.7148" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="424.4648" x="427.3916" y="656.918">Choose a Generalist Data Repository</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="28.6084" x="386.7832" y="644.0508">yes</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacing" textLength="22.2275" x="863.8564" y="644.0508">no</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="85.7422" x="362.5205" y="671.9805"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="65.7422" x="372.5205" y="705.1836">Use it</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="268.168" x="739.7725" y="671.9805"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="248.168" x="749.7725" y="705.1836">Um, use the R: Drive?</text><ellipse cx="873.8564" cy="751.2461" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="873.8564" cy="751.2461" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="85.7422" x="1037.9404" y="633.7148"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="65.7422" x="1047.9404" y="666.918">Use it</text><polygon fill="#F1F1F1" points="860.2178,772.2461,872.2178,784.2461,860.2178,796.2461,848.2178,784.2461,860.2178,772.2461" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="569.9336,802.2461,581.9336,814.2461,569.9336,826.2461,557.9336,814.2461,569.9336,802.2461" style="stroke:#181818;stroke-width:0.5;"/><path d="M628.9902,836.2461 L628.9902,879.6445 L608.9902,883.6445 L628.9902,887.6445 L628.9902,931.043 A0,0 0 0 0 628.9902,931.043 L1291.0879,931.043 A0,0 0 0 0 1291.0879,931.043 L1291.0879,846.2461 L1281.0879,836.2461 L628.9902,836.2461 A0,0 0 0 0 628.9902,836.2461" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><path d="M1281.0879,836.2461 L1281.0879,846.2461 L1291.0879,846.2461 L1281.0879,836.2461" fill="#FFFFE0" style="stroke:#181818;stroke-width:4;"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="634.8984" x="634.9902" y="864.4492">If you made it here, you found a disipline, institutional</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="595.207" x="634.9902" y="892.7148">or generalist repo that can address all of the above</text><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="641.0977" x="634.9902" y="920.9805">considerations, sensitivity, access control, data volume</text><rect fill="#F1F1F1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="78.1133" x="530.877" y="859.5117"/><text fill="#000000" font-family="sans-serif" font-size="24" lengthAdjust="spacing" textLength="58.1133" x="540.877" y="892.7148">done</text><line style="stroke:#8B0000;stroke-width:1;" x1="569.9336" x2="569.9336" y1="129.7305" y2="286.0586"/><polygon fill="#8B0000" points="565.9336,276.0586,569.9336,286.0586,573.9336,276.0586,569.9336,280.0586" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="873.8564" x2="873.8564" y1="720.2461" y2="740.2461"/><polygon fill="#8B0000" points="869.8564,730.2461,873.8564,740.2461,877.8564,730.2461,873.8564,734.2461" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="415.3916" x2="405.3916" y1="647.8477" y2="647.8477"/><line style="stroke:#8B0000;stroke-width:1;" x1="405.3916" x2="405.3916" y1="647.8477" y2="671.9805"/><polygon fill="#8B0000" points="401.3916,661.9805,405.3916,671.9805,409.3916,661.9805,405.3916,665.9805" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="863.8564" x2="873.8564" y1="647.8477" y2="647.8477"/><line style="stroke:#8B0000;stroke-width:1;" x1="873.8564" x2="873.8564" y1="647.8477" y2="671.9805"/><polygon fill="#8B0000" points="869.8564,661.9805,873.8564,671.9805,877.8564,661.9805,873.8564,665.9805" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="405.3916" x2="405.3916" y1="720.2461" y2="784.2461"/><line style="stroke:#8B0000;stroke-width:1;" x1="405.3916" x2="848.2178" y1="784.2461" y2="784.2461"/><polygon fill="#8B0000" points="838.2178,780.2461,848.2178,784.2461,838.2178,788.2461,842.2178,784.2461" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="735.6357" x2="639.624" y1="595.4492" y2="595.4492"/><line style="stroke:#8B0000;stroke-width:1;" x1="639.624" x2="639.624" y1="595.4492" y2="633.7148"/><polygon fill="#8B0000" points="635.624,623.7148,639.624,633.7148,643.624,623.7148,639.624,627.7148" style="stroke:#8B0000;stroke-width:1;"/><line style="stroke:#8B0000;stroke-width:1;" x1="984.7998" x2="1080.8115" y1="595.4492" y2="595.4492"/><line style="stroke:#8B0000;stroke-width:1;" x1="1080.8115" x2="1080.8115" y1="595.4492" y2="633.7148"